<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FETCH — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0f;
      --surface: #13131a;
      --surface2: #1a1a24;
      --border: #2a2a38;
      --accent: #f0e040;
      --accent2: #ff4d6d;
      --text: #e8e8f0;
      --muted: #6b6b88;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background-image:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(240,224,64,0.06) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(255,255,255,0.012) 80px),
        repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(255,255,255,0.012) 80px);
    }

    .wrap {
      width: 100%;
      max-width: 360px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-area {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo {
      font-family: var(--sans);
      font-size: 64px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--accent);
      text-shadow: 0 0 48px rgba(240,224,64,0.2);
    }

    .logo-arrow {
      display: block;
      font-size: 26px;
      color: var(--muted);
      font-weight: 400;
      margin-top: 2px;
    }

    .tagline {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 10px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .card-inner {
      padding: 28px;
    }

    .card-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .providers {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .providers form { width: 100%; }

    .btn {
      display: block;
      width: 100%;
      padding: 12px 18px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      text-align: center;
      letter-spacing: 0.01em;
    }

    .btn:hover {
      border-color: var(--accent);
      background: rgba(240,224,64,0.05);
      color: var(--accent);
    }

    .btn:active {
      background: rgba(240,224,64,0.1);
    }

    .loading-text {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding: 8px 0;
    }

    .error-msg {
      margin-top: 16px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent2);
      background: rgba(255,77,109,0.06);
      border: 1px solid rgba(255,77,109,0.2);
      border-radius: 3px;
      padding: 10px 12px;
      display: none;
      line-height: 1.5;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .footer a { color: var(--muted); text-decoration: none; }
    .footer a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo-area">
      <div class="logo">FETCH<span class="logo-arrow">↓</span></div>
      <div class="tagline">powered by yt-dlp · 1000+ sites</div>
    </div>

    <div class="card">
      <div class="card-inner">
        <div class="card-label">Sign in to continue</div>
        <div class="providers" id="providers">
          <p class="loading-text">Loading...</p>
        </div>
        <div class="error-msg" id="error"></div>
      </div>
    </div>

    <div class="footer">self-hosted · <a href="https://github.com/yt-dlp/yt-dlp" target="_blank">yt-dlp</a></div>
  </div>

  <script>
    const providerNames = {
      github: 'GitHub',
      google: 'Google',
      authentik: 'Authentik',
    }

    async function loadProviders() {
      const container = document.getElementById('providers')
      const errorEl = document.getElementById('error')

      try {
        const [providersRes, csrfRes] = await Promise.all([
          fetch('/api/providers'),
          fetch('/auth/csrf'),
        ])
        if (!providersRes.ok) throw new Error('Failed to load providers')
        const providers = await providersRes.json()
        const { csrfToken } = await csrfRes.json()

        if (providers.length === 0) {
          container.innerHTML = '<p class="loading-text" style="color:var(--accent2)">No sign-in providers configured.</p>'
          return
        }

        container.innerHTML = ''
        for (const provider of providers) {
          const label = providerNames[provider.id] || provider.name
          const form = document.createElement('form')
          form.action = `/auth/signin/${provider.id}`
          form.method = 'post'
          const csrf = document.createElement('input')
          csrf.type = 'hidden'
          csrf.name = 'csrfToken'
          csrf.value = csrfToken
          const button = document.createElement('button')
          button.type = 'submit'
          button.className = 'btn'
          button.textContent = `Sign in with ${label}`
          form.appendChild(csrf)
          form.appendChild(button)
          container.appendChild(form)
        }
      } catch (err) {
        container.innerHTML = ''
        errorEl.textContent = 'Could not load sign-in options. Please refresh.'
        errorEl.style.display = 'block'
      }
    }

    // Show error from OAuth redirect if present
    const params = new URLSearchParams(window.location.search)
    const rawError = params.get('error')
    if (rawError) {
      const errorEl = document.getElementById('error')
      errorEl.textContent = `Sign-in failed: ${rawError.slice(0, 80)}`
      errorEl.style.display = 'block'
    }

    loadProviders()
  </script>
</body>
</html>
